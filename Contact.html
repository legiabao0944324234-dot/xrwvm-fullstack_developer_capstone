<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Best Cars</title>
  <link rel="stylesheet" href="../static/style.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background:#f4f4f4; }
    .navbar { background:#1a1a2e; color:white; padding:14px 32px; display:flex; align-items:center; gap:24px; }
    .navbar .brand { font-size:20px; font-weight:700; color:#e94560; }
    .navbar a { color:#ccc; text-decoration:none; font-size:14px; }
    .navbar a.active { color:white; font-weight:600; border-bottom:2px solid #e94560; padding-bottom:2px; }
    .content { padding:40px; max-width:700px; margin:0 auto; }
    h1 { color:#1a1a2e; margin-bottom:24px; }
    .card { background:white; border-radius:8px; padding:32px; box-shadow:0 2px 6px rgba(0,0,0,.08); }
    .form-group { margin-bottom:16px; }
    label { display:block; font-size:13px; font-weight:600; margin-bottom:5px; color:#333; }
    input, textarea { width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:4px; font-size:13px; }
    textarea { height:110px; resize:vertical; }
    .btn { background:#e94560; color:white; border:none; padding:11px 32px; border-radius:4px; font-size:14px; font-weight:600; cursor:pointer; margin-top:6px; }
    .info { margin-top:28px; padding-top:20px; border-top:1px solid #eee; }
    .info p { color:#555; font-size:13px; line-height:2; }
  </style>
</head>
<body>
  <div class="navbar">
    <span class="brand">Best Cars</span>
    <a href="/">Home</a>
    <a href="/about">About Us</a>
    <a href="/contact" class="active">Contact Us</a>
  </div>
  <div class="content">
    <h1>Contact Us</h1>
    <div class="card">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" placeholder="Enter your full name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="How can we help you?"></textarea>
      </div>
      <button class="btn">Send Message</button>
      <div class="info">
        <p>📧 support@bestcars.com</p>
        <p>📞 +1 (800) 555-CARS</p>
        <p>📍 123 Auto Drive, Detroit, MI 48201</p>
        <p>🕐 Mon–Fri: 9am – 6pm EST</p>
      </div>
    </div>
  </div>
</body>
</html>
